    function hexToRgb(hex) {
      if (!hex) return null;
      const shorthandRegex = /^#?([a-f\d])([a-f\d])([a-f\d])$/i;
      const fullHex = hex.replace(shorthandRegex, (m, r, g, b) => r + r + g + g + b + b);
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(fullHex);
      return result ? {
        r: parseInt(result[1], 16),
        g: parseInt(result[2], 16),
        b: parseInt(result[3], 16)
      } : null;
    }

    function getNearestColorName(hex) {
      const rgb = hexToRgb(hex);
      if (!rgb) return 'New Color';
      let minDistance = Infinity;
      let closestName = 'New Color';
      for (const c of COLOR_NAMES_LIST) {
        const cRgb = hexToRgb(c.hex);
        if (!cRgb) continue;
        const dist = Math.sqrt(
          Math.pow(rgb.r - cRgb.r, 2) +
          Math.pow(rgb.g - cRgb.g, 2) +
          Math.pow(rgb.b - cRgb.b, 2)
        );
        if (dist < minDistance) {
          minDistance = dist;
          closestName = c.name;
        }
      }
      return closestName;
    }

    function resolveHexFromName(name) {
      if (!name) return '#808080';
      const cleanName = name.trim().toLowerCase();
      // 1. Direct match in COLOR_NAMES_LIST
      const found = COLOR_NAMES_LIST.find(c => c.name.toLowerCase() === cleanName);
      if (found) return found.hex;

      // 2. Partial match
      const partial = COLOR_NAMES_LIST.find(c => cleanName.includes(c.name.toLowerCase()) || c.name.toLowerCase().includes(cleanName));
      if (partial) return partial.hex;

      // 3. Fallbacks for basic color keywords
      const cssColors = {
        black: '#000000',
        white: '#ffffff',
        red: '#dc2626',
        green: '#16a34a',
        blue: '#2563eb',
        yellow: '#ca8a04',
        orange: '#ea580c',
        purple: '#9333ea',
        pink: '#db2777',
        gray: '#4b5563',
        grey: '#4b5563',
        brown: '#78350f',
        beige: '#f5f5dc',
        cream: '#fdf6e2',
        gold: '#eab308',
        silver: '#cbd5e1',
        bronze: '#cd7f32',
        navy: '#1e3a8a',
        teal: '#0d9488',
        olive: '#808000',
        lime: '#84cc16',
        lavender: '#e9d5ff',
        peach: '#ffdab9',
        coral: '#f87171',
        tan: '#d2b48c',
        indigo: '#4f46e5',
        violet: '#7c3aed',
        magenta: '#d946ef',
        cyan: '#06b6d4',
        amber: '#f59e0b',
        emerald: '#10b981',
        rose: '#f43f5e',
        plum: '#4c1d95',
        rust: '#b45309',
        silt: '#4a4540',
        sage: '#8fa89b',
        obsidian: '#2d2a26',
        alabaster: '#fcfbfa',
        desert: '#cda885',
        sand: '#f5f5dc'
      };

      for (const [key, hex] of Object.entries(cssColors)) {
        if (cleanName.includes(key)) {
          return hex;
        }
      }

      // 4. Fallback to a nice deterministic color based on hashing the name
      let hash = 0;
      for (let i = 0; i < cleanName.length; i++) {
        hash = cleanName.charCodeAt(i) + ((hash << 5) - hash);
      }
      let color = '#';
      for (let i = 0; i < 3; i++) {
        const value = (hash >> (i * 8)) & 0xFF;
        const balanced = Math.floor(40 + (value % 160));
        color += ('00' + balanced.toString(16)).slice(-2);
      }
      return color;
    }

    function Toast({ toasts, remove }) {
      return (
        <div className="fixed bottom-6 right-6 z-[9999] flex flex-col gap-2 pointer-events-none">

            <div key={t.id} className={`slide-in flex items-center gap-3 px-5 py-3 rounded-xl shadow-2xl text-white text-sm font-semibold min-w-[260px] pointer-events-auto

              <span className="flex-1">{t.message}</span>
              <button className="opacity-60 hover:opacity-100" onClick={()=>remove(t.id)}><i className="fas fa-times text-xs"></i></button>
            </div>
          ))}
        </div>
      );
    }

    function useToast() {
      const [toasts, setToasts] = useState([]);
      const add = useCallback((message, type='success') => {
        const id = genId();
        setToasts(p => [...p, { id, message, type }]);
        setTimeout(() => setToasts(p => p.filter(t=>t.id!==id)), 4000);
      }, []);
      const remove = useCallback(id => setToasts(p=>p.filter(t=>t.id!==id)), []);
      return { toasts, add, remove };
    }

    /* ============================================
       LOGIN PAGE
    ============================================ */
    function LoginPage({ onLogin }) {

      const [pass,     setPass]     = useState('');
      const [showPass, setShowPass] = useState(false);
      const [error,    setError]    = useState('');
      const [loading,  setLoading]  = useState(false);

      const submit = e => {
        e.preventDefault();
        setError(''); setLoading(true);
        fetch('/api/admin.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user, password: pass })
        })
        .then(async res => {
          const data = await res.json();
          setLoading(false);
          if (res.ok && data.success) {
            sessionStorage.setItem('aura_admin_auth', '1');
            onLogin();
          } else {
            setError(data.error || 'Invalid username or password.');
          }
        })

          // Fallback to local login if API is offline
          const currentPass = localStorage.getItem('aura_admin_password') || 'admin123';
          if (user === ADMIN_USER && pass === currentPass) {
            sessionStorage.setItem('aura_admin_auth', '1');
            onLogin();

              <i className="fas fa-store w-4 text-center flex-shrink-0"></i>

    /* ============================================
       DASHBOARD PAGE
    ============================================ */

      const totalVal  = products.reduce((s,p) => s + p.price, 0);
      const cats      = [...new Set(products.map(p=>p.category))];
      const avgRating = (products.reduce((s,p)=>s+p.rating,0)/(products.length||1)).toFixed(1);
      const saleCount = products.filter(p=>p.originalPrice).length;

      const catDist = categories.map(cat => ({
        cat, count: products.filter(p=>p.category===cat).length
      })).filter(c=>c.count>0);
      const maxCount = Math.max(...catDist.map(c=>c.count), 1);

      return (
        <div className="space-y-7 fade-in">
          {/* Header */}
          <div className="flex items-center justify-between">
            <div>
              <h1 className="font-heading text-2xl font-extrabold text-gray-900">Dashboard</h1>
              <p className="text-gray-400 text-xs mt-0.5">Welcome back — here's your store overview.</p>
            </div>
            <button onClick={()=>setPage('add')} className="flex items-center gap-2 px-4 py-2 bg-accent text-white text-sm font-semibold rounded-xl hover:bg-accent-dark transition-colors shadow-lg shadow-accent/30">
              <i className="fas fa-plus"></i> Add Product
            </button>
          </div>

          {/* Stats */}
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <StatsCard icon="fas fa-box-open"  label="Total Products"  value={products.length} sub="Active catalog"          bg="bg-accent"      trend={12} />
            <StatsCard icon="fas fa-dollar-sign" label="Total Value"     value={`Br ${totalVal.toFixed(2)}`} sub="Current retail price"   bg="bg-green-500"  trend={8}  />
            <StatsCard icon="fas fa-tags"        label="Categories"    value={cats.length}       sub={`of ${categories.length}`} bg="bg-blue-500"  />
            <StatsCard icon="fas fa-star"        label="Avg Rating"    value={avgRating}          sub={`${saleCount} on sale`}    bg="bg-amber-500" trend={2}  />
          </div>

          {/* Recent + Category breakdown */}
          <div className="grid grid-cols-1 lg:grid-cols-5 gap-5">
            {/* Recent Products */}
            <div className="lg:col-span-3 bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
              <div className="flex items-center justify-between mb-4">
                <h2 className="font-heading font-bold text-gray-900">Recent Products</h2>
                <button onClick={()=>setPage('products')} className="text-accent text-xs font-semibold hover:underline">View All →</button>
              </div>
              <div className="space-y-2">
                {[...products].reverse().slice(0,5).map(p => (
                  <div key={p.id} className="flex items-center gap-3 p-2.5 rounded-xl hover:bg-gray-50 transition-colors">
                    {p.image ? (
                      <img src={p.image} className="w-10 h-10 rounded-xl object-cover flex-shrink-0" alt="" />
                    ) : (
                      <div className="w-10 h-10 rounded-xl flex items-center justify-center text-xl flex-shrink-0" style={{background:p.iconBg}}>{p.icon}</div>
                    )}
                    <div className="flex-1 min-w-0">
                      <p className="text-sm font-semibold text-gray-900 truncate">{p.title}</p>
                      <p className="text-xs text-gray-400">{p.category}</p>
                    </div>
                    <div className="text-right flex-shrink-0">
                      <p className="text-sm font-bold text-gray-900">Br {p.price.toFixed(2)}</p>
                      <p className="text-xs text-amber-500">★ {p.rating}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Category bars */}
            <div className="lg:col-span-2 bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
              <h2 className="font-heading font-bold text-gray-900 mb-4">By Category</h2>
              <div className="space-y-3">
                {catDist.map(c => (
                  <div key={c.cat}>
                    <div className="flex justify-between text-xs mb-1">
                      <span className="font-medium text-gray-700">{c.cat}</span>
                      <span className="text-gray-400">{c.count}</span>
                    </div>
                    <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                      <div className="h-full bg-accent rounded-full transition-all duration-700" style={{width:`${(c.count/maxCount)*100}%`}}></div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Quick actions */}
          <div className="bg-gradient-to-r from-gray-950 to-gray-800 rounded-2xl p-5">
            <h2 className="font-heading font-bold text-white mb-3 text-sm uppercase tracking-widest">Quick Actions</h2>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
              {[
                {icon:'fa-plus',       label:'Add',      action:()=>setPage('add')},
                {icon:'fa-box-open',   label:'Products', action:()=>setPage('products')},
                {icon:'fa-chart-line', label:'Analytics',action:()=>setPage('analytics')},
                {icon:'fa-cog',        label:'Settings', action:()=>setPage('settings')},
              ].map(q=>(
                <button key={q.label} onClick={q.action}
                  className="flex flex-col items-center gap-2 py-4 rounded-xl bg-white/10 hover:bg-accent transition-all duration-200 text-white text-xs font-semibold">
                  <i className={`fas ${q.icon} text-base`}></i>{q.label}
